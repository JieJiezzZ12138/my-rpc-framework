# Zookeeper \u6CE8\u518C\u4E2D\u5FC3\u516C\u7F51\u5730\u5740
rpc.zookeeper.address=39.107.74.108:2181

# \u8D1F\u8F7D\u5747\u8861\u7B56\u7565
